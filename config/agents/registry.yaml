    },
    "defaultOrder": [
      "default"
    ],
    "repairRoutes": {
      "orchestration": "default",
      "state": "default",
      "event": "default",
      "plugin": "default",
      "visual": "default",
      "graph-quality": "default",
      "ambiguous": "default"
    }
  }
